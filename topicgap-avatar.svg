<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="TopicGap AI agent avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EBBEE"/>
      <stop offset="1" stop-color="#05161E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7DF0FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7DF0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#9CD7F0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded-square app icon -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="104" fill="none" stroke="#7DF0FF" stroke-opacity="0.25" stroke-width="2"/>

  <!-- topic graph -->
  <g stroke="#CFEFFF" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round">
    <line x1="176" y1="200" x2="300" y2="150"/>
    <line x1="300" y1="150" x2="372" y2="232"/>
    <line x1="176" y1="200" x2="236" y2="318"/>
    <line x1="236" y1="318" x2="372" y2="232"/>
    <line x1="300" y1="150" x2="240" y2="300"/>
    <line x1="240" y1="300" x2="360" y2="356"/>
    <line x1="372" y1="232" x2="360" y2="356"/>
  </g>

  <!-- regular nodes -->
  <g fill="url(#node)" filter="url(#soft)">
    <circle cx="176" cy="200" r="22"/>
    <circle cx="300" cy="150" r="22"/>
    <circle cx="372" cy="232" r="22"/>
    <circle cx="236" cy="318" r="22"/>
    <circle cx="360" cy="356" r="22"/>
  </g>

  <!-- highlighted GAP node (the discovery) -->
  <circle cx="240" cy="300" r="60" fill="url(#glow)"/>
  <circle cx="240" cy="300" r="34" fill="#FFFFFF" filter="url(#soft)"/>
  <circle cx="240" cy="300" r="34" fill="none" stroke="#2EBBEE" stroke-width="4"/>
  <!-- magnifier suggesting research/discovery -->
  <g stroke="#05161E" stroke-width="6" fill="none" stroke-linecap="round">
    <circle cx="240" cy="300" r="16"/>
    <line x1="252" y1="312" x2="266" y2="326"/>
  </g>
</svg>
